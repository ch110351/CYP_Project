<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <link rel="stylesheet" href="./css/ui-static.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand-box"><img src="./assets/cyp-logo.png" alt="CYP logo" /></div>
        <div class="topbar-note">Static page for UI drawing</div>
      </header>
      <div class="workspace">
        <aside class="sidebar">
          <div class="nav-group">
            <p class="nav-title">Setting</p>
            <a class="nav-link is-active" href="./admin.html">Admin</a>
          </div>
        </aside>
        <main class="main">
          <section class="canvas">
            <span class="eyebrow">Setting</span>
            <h1 class="page-title">Admin</h1>
            <div class="split" style="margin-top:18px">
              <section class="page-card form-panel">
                <div class="panel-header"><span class="eyebrow">Security</span><h2 class="panel-title">Access Control</h2></div>
                <div class="form-grid">
                  <label class="field"><span>Admin Password</span><input type="password" value="password" /></label>
                  <label class="field"><span>Confirm Password</span><input type="password" value="password" /></label>
                  <label class="field"><span>Access Role</span><select><option selected>Administrator</option><option>Operator</option></select></label>
                </div>
              </section>
              <section class="page-card preview-panel">
                <div class="panel-header"><span class="eyebrow">Maintenance</span><h2 class="panel-title">System Actions</h2></div>
                <div class="list">
                  <div class="list-item"><strong>Import / Export Config</strong><div class="muted">System configuration transfer</div></div>
                  <div class="list-item"><strong>Firmware Update</strong><div class="muted">OTA and manual package flow</div></div>
                  <div class="list-item"><strong>Reboot / Factory Reset</strong><div class="muted">Maintenance and recovery actions</div></div>
                </div>
              </section>
            </div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
