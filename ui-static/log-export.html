<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Log Export</title>
    <link rel="stylesheet" href="./css/ui-static.css" />

  <body>
    <div class="shell">

        <div class="brand-box"><img src="./assets/cyp-logo.png" alt="CYP logo" /></div>

      <div class="workspace">
        <aside class="sidebar">
