<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network</title>
    <link rel="stylesheet" href="./css/ui-static.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand-box"><img src="./assets/cyp-logo.png" alt="CYP logo" /></div>
        <div class="topbar-note">Static page for UI drawing</div>
      </header>
      <div class="workspace">
        <aside class="sidebar">
          <div class="nav-group">
            <p class="nav-title">Setting</p>
            <a class="nav-link is-active" href="./network.html">Network</a>
          </div>
        </aside>
        <main class="main">
          <section class="canvas">
            <span class="eyebrow">Setting</span>
            <h1 class="page-title">Network</h1>
            <div class="split" style="margin-top:18px">
              <section class="page-card form-panel">
                <div class="panel-header"><span class="eyebrow">Ethernet</span><h2 class="panel-title">Wired Network</h2></div>
                <div class="form-grid">
                  <label class="field"><span>Mode</span><select><option selected>DHCP</option><option>Static</option></select></label>
                  <label class="field"><span>IP Address</span><input type="text" value="192.168.10.88" /></label>
                  <label class="field"><span>Subnet Mask</span><input type="text" value="255.255.255.0" /></label>
                  <label class="field"><span>Gateway</span><input type="text" value="192.168.10.1" /></label>
                </div>
              </section>
              <section class="page-card preview-panel">
                <div class="panel-header"><span class="eyebrow">Wi-Fi</span><h2 class="panel-title">Wireless Networks</h2></div>
                <div class="list">
                  <div class="list-item is-selected"><strong>Cypress_Setup_5G</strong><div class="muted">Connected / Secure / Strong</div></div>
                  <div class="list-item"><strong>MeetingRoom_AP</strong><div class="muted">Secure / Strong</div></div>
                  <div class="list-item"><strong>Guest_Network</strong><div class="muted">Open / Medium</div></div>
                </div>
              </section>
            </div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
