<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Command Editor</title>
    <link rel="stylesheet" href="./css/ui-static.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand-box"><img src="./assets/cyp-logo.png" alt="CYP logo" /></div>
        <div class="topbar-note">Static page for UI drawing</div>
      </header>
      <div class="workspace">
        <aside class="sidebar">
          <div class="nav-group">
            <p class="nav-title">Control</p>
            <a class="nav-link is-active" href="./command-editor.html">Command Editor</a>
          </div>
        </aside>
        <main class="main">
          <section class="canvas">
            <span class="eyebrow">Automation</span>
            <h1 class="page-title">Command Editor</h1>
            <div class="form-shell" style="margin-top:18px">
              <section class="page-card form-panel">
                <div class="panel-header"><span class="eyebrow">Definition</span><h2 class="panel-title">Command Properties</h2></div>
                <div class="form-grid">
                  <label class="field"><span>Name</span><input type="text" value="Display Power On" /></label>
                  <label class="field"><span>Protocol</span><select><option>System</option><option selected>HTTP</option><option>Telnet</option><option>RS-232</option></select></label>
                  <label class="field full"><span>Command String</span><textarea>POST /api/device/power/on</textarea></label>
                  <label class="field"><span>Timeout</span><input type="text" value="3 sec" /></label>
                  <label class="field"><span>Retry Count</span><input type="number" value="1" /></label>
                </div>
              </section>
              <section class="page-card preview-panel">
                <div class="panel-header"><span class="eyebrow">Binding</span><h2 class="panel-title">Execution Context</h2></div>
                <div class="preview-card"><span>Target Device</span><strong>Main Display</strong></div>
                <div class="preview-card"><span>Expected Response</span><strong>HTTP 200 / JSON ack</strong></div>
                <div class="preview-card"><span>Notes</span><ul><li>Shared by 6 macros</li><li>Visible to admin and operator roles</li></ul></div>
              </section>
            </div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
