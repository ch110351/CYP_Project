<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Preview</title>
    <link rel="stylesheet" href="./css/ui-static.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand-box"><img src="./assets/cyp-logo.png" alt="CYP logo" /></div>
        <div class="topbar-note">Static page for UI drawing</div>
      </header>
      <div class="workspace">
        <aside class="sidebar">
          <div class="nav-group">
            <p class="nav-title">Scenes</p>
            <a class="nav-link is-active" href="./panel-preview.html">Panel Preview</a>
          </div>
        </aside>
        <main class="main">
          <section class="canvas">
            <span class="eyebrow">Scene Management</span>
            <h1 class="page-title">Panel Preview</h1>
            <div class="page-card" style="margin-top:18px">
              <div class="panel-header"><span class="eyebrow">Preview</span><h2 class="panel-title">Room Control Mock</h2></div>
              <div class="placeholder-screen">
                <div class="mini-grid">
                  <div class="summary-card"><span>Zone</span><strong>Main Display</strong></div>
                  <div class="summary-card"><span>Zone</span><strong>Audio</strong></div>
                  <div class="summary-card"><span>Zone</span><strong>Camera</strong></div>
                  <div class="summary-card"><span>Action</span><strong>Power</strong></div>
                  <div class="summary-card"><span>Action</span><strong>Source</strong></div>
                  <div class="summary-card"><span>Action</span><strong>Volume</strong></div>
                </div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
